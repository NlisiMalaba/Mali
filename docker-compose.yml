services:
  postgres:
    image: postgres:16-alpine
    container_name: mali_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mali
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mali_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./mali_api
      dockerfile: Dockerfile
    container_name: mali_api
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/mali?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      PORT: ${PORT:-8080}
      ENV: ${ENV:-development}
    volumes:
      - ./mali_api:/app
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:

